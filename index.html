<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙印优品印刷包装</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- 导航 -->
<header class="header">
    <div class="container nav">
        <h1 class="logo">龙印优品印刷包装</h1>
        <nav>
            <a href="#company">公司介绍</a>
            <a href="#equipment">设备工艺</a>
            <a href="#products">产品展示</a>
            <a href="#cert">资质认证</a>
        </nav>
    </div>
</header>

<!-- Banner -->
<section class="hero">
    <div class="hero-text">
        <h2>专业包装印刷解决方案</h2>
        <p>专注高品质印刷与包装一体化服务</p>
    </div>
</section>

<!-- 公司介绍 -->
<section id="company" class="section">
    <div class="container card">
        <h2>公司介绍</h2>
        <p>专业包装印刷服务提供商，一站式解决方案，涵盖设计、印刷、包装与后期加工。</p>
    </div>
</section>

<!-- 设备工艺 -->
<section id="equipment" class="section">
    <div class="container">
        <h2>设备工艺</h2>
        <div class="grid">
            <img src="equipment-roland.jpg">
            <img src="equipment-printing-line.jpg">
            <img src="equipment-silk-screen.jpg">
        </div>
    </div>
</section>

<!-- 产品展示 -->
<section id="products" class="section">
    <div class="container">
        <h2>产品展示</h2>
        <div class="grid">
            <img src="gallery-01.jpg">
            <img src="gallery-02.jpg">
            <img src="gallery-03.jpg">
            <img src="product-green-box.jpg">
            <img src="hero-showroom.jpg">
            <img src="office-showroom.jpg">
        </div>
    </div>
</section>

<!-- 资质认证 -->
<section id="cert" class="section">
    <div class="container">
        <h2>资质认证</h2>
        <div class="cert">
            <img src="certificate-1.jpg">
            <img src="certificate-2.jpg">
        </div>
    </div>
</section>

<!-- 页脚 -->
<footer class="footer">
    <p>© 2026 龙印优品印刷包装</p>
</footer>

</body>
